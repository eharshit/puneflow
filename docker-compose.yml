services:

  # =========================
  # HIVE METASTORE DATABASE
  # =========================
  postgres-metastore:
    image: postgres:13
    container_name: hive-metastore-db
    environment:
      POSTGRES_DB: metastore
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
    ports:
      - "5435:5432"
    volumes:
      - metastore-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U hive -d metastore" ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # =========================
  # HIVE METASTORE SERVICE
  # =========================
  hive-metastore:
    image: apache/hive:3.1.3
    container_name: hive-metastore
    depends_on:
      postgres-metastore:
        condition: service_healthy
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres # Set to "false" on FIRST run, then change to "true" after that
      IS_RESUME: "true"
    ports:
      - "9083:9083"
    volumes:
      - ./hive-conf/hive-site.xml:/opt/hive/conf/hive-site.xml
      - ./warehouse:/opt/hive/warehouse
    restart: unless-stopped

  # =========================
  # SPARK MASTER
  # =========================
  spark-master:
    image: apache/spark:3.5.1
    container_name: spark-master
    hostname: spark-master
    command: >
      bash -c " /opt/spark/sbin/start-master.sh && tail -f /opt/spark/logs/spark--org.apache.spark.deploy.master*.out "
    ports:
      - "8080:8080" # Spark Master UI
      - "7077:7077" # cluster connection endpoint

    volumes:
      - ./warehouse:/opt/spark/warehouse
      - ./apps:/opt/spark-apps
      - ./spark-ivy:/tmp/.ivy
    healthcheck:
      test: [ "CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8080'" ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # =========================
  # SPARK WORKER
  # =========================
  spark-worker:
    image: apache/spark:3.5.1
    container_name: spark-worker
    hostname: spark-worker
    command: >
      bash -c "/opt/spark/sbin/start-worker.sh spark://spark-master:7077 --cores 6 --memory 6g && tail -f /opt/spark/logs/spark--org.apache.spark.deploy.worker*.out"
    depends_on:
      spark-master:
        condition: service_healthy
    ports:
      - "10000:10000"

    volumes:
      - ./warehouse:/opt/spark/warehouse
      - ./apps:/opt/spark-apps
      - ./spark-ivy:/tmp/.ivy
    restart: unless-stopped

  # =========================
  # KAFKA (KRaft mode)
  # =========================
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    user: root
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_EXTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_EXTERNAL://localhost:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_LOG_DIRS: /var/kafka-data/kraft-combined-logs
    volumes:
      - kafka-data:/var/kafka-data
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1" ]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  # =========================
  # KAFKA UI
  # =========================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    restart: unless-stopped



volumes:
  metastore-db-data:
  kafka-data:
